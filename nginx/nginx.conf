worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream=$upstream_addr';
    access_log /var/log/nginx/access.log main;

    # ============ 负载均衡配置 ============

    # 用户服务 - 轮询(默认)
    upstream user_backend {
        server user-service-1:8081;
        server user-service-2:8081;
    }

    # 商品服务 - 加权轮询
    upstream product_backend {
        server product-service:8082;
    }

    # 订单服务 - IP Hash（同一用户路由到同一实例）
    upstream order_backend {
        ip_hash;
        server order-service-1:8084;
        server order-service-2:8084;
    }

    # 库存服务 - 最少连接
    upstream inventory_backend {
        least_conn;
        server inventory-service:8083;
    }

    server {
        listen 80;
        server_name localhost;

        # ============ 动静分离 ============

        # 静态文件 - 直接由Nginx处理
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # 前端HTML
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ============ API反向代理 ============

        location /api/user/ {
            proxy_pass http://user_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/product/ {
            proxy_pass http://product_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/order/ {
            proxy_pass http://order_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/inventory/ {
            proxy_pass http://inventory_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 健康检查
        location /nginx-health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
